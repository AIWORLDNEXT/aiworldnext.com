<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIWorldNext — Global AI & Robotics Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="description" content="AIWorldNext — news, jobs, blogs, and tools for AI & robotics" />
</head>
<body class="bg-[#071026] text-gray-100 antialiased">
  <header class="max-w-7xl mx-auto p-6 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-indigo-500 rounded-lg flex items-center justify-center text-2xl font-bold">AI</div>
      <div>
        <h1 class="text-2xl font-semibold">AIWorldNext</h1>
        <p class="text-sm text-gray-400">Global hub for AI & Robotics — News · Blogs · Jobs · Tools</p>
      </div>
    </div>
    <nav class="hidden md:flex gap-6 text-sm text-gray-300">
      <a href="#" class="hover:text-white">News</a>
      <a href="#" class="hover:text-white">Blogs</a>
      <a href="#" class="hover:text-white">Jobs</a>
      <a href="#" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-indigo-500 rounded-md font-medium text-white">Get Started</a>
    </nav>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <section>
      <h2 class="text-4xl font-bold text-center mb-8">Latest AI News</h2>
      <div id="news-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- News cards inserted here -->
      </div>
    </section>

    <section class="mt-12">
      <h2 class="text-3xl font-bold mb-6">Recent Blogs</h2>
      <div id="blogs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Blogs inserted here -->
      </div>
    </section>

    <section class="mt-12 mb-20">
      <h2 class="text-3xl font-bold mb-6">Open Positions</h2>
      <div id="jobs-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Jobs inserted here -->
      </div>
    </section>
  </main>

  <footer class="max-w-7xl mx-auto p-6 text-gray-400">
    <div class="flex items-center justify-between">
      <div>
        <strong>AIWorldNext</strong>
        <div class="text-sm text-gray-500">Made with ❤️ for the global AI community</div>
      </div>
      <div class="text-sm">© 2025 AIWorldNext</div>
    </div>
  </footer>

<script>
async function fetchJSON(path){
  try{
    const res = await fetch(path);
    if(!res.ok) throw new Error('Network response not ok');
    return await res.json();
  } catch(e) {
    console.error('Fetch error', e);
    return [];
  }
}

function createNewsCard(item){
  const div = document.createElement('article');
  div.className = 'bg-gradient-to-b from-[#0b1220] to-[#071026] rounded-xl overflow-hidden shadow-lg border border-gray-800';
  div.innerHTML = `
    <div class="relative">
      <img src="${item.image}" alt="${item.title}" class="w-full h-44 object-cover brightness-75"/>
      <div class="absolute left-4 bottom-4 text-white">
        ${item.tags.map(t=>`<span class="text-xs bg-black/40 px-2 py-1 rounded mr-2">${t}</span>`).join('')}
      </div>
    </div>
    <div class="p-4">
      <h3 class="font-semibold text-lg mb-2">${item.title}</h3>
      <p class="text-sm text-gray-400 mb-4">${item.description}</p>
      <div class="flex items-center justify-between text-xs text-gray-400">
        <div>📅 ${new Date(item.date).toLocaleDateString()}</div>
        <div>📰 ${item.source || 'Unknown'}</div>
      </div>
    </div>
  `;
  return div;
}

function createBlogCard(item){
  const div = document.createElement('article');
  div.className = 'bg-[#081426] rounded-xl overflow-hidden shadow border border-gray-800';
  div.innerHTML = `
    <img src="${item.image}" alt="${item.title}" class="w-full h-40 object-cover"/>
    <div class="p-4">
      <h3 class="font-semibold mb-1">${item.title}</h3>
      <div class="text-xs text-gray-400 mb-2">By ${item.author} · ${new Date(item.date).toLocaleDateString()}</div>
      <p class="text-sm text-gray-300 mb-3">${item.excerpt}</p>
      <a href="${item.link}" class="text-sm text-indigo-300">Read →</a>
    </div>
  `;
  return div;
}

function createJobCard(item){
  const div = document.createElement('article');
  div.className = 'bg-[#081426] rounded-xl overflow-hidden shadow border border-gray-800';
  div.innerHTML = `
    <div class="p-4 flex gap-3">
      <img src="${item.image}" alt="${item.title}" class="w-20 h-20 object-cover rounded-lg"/>
      <div class="flex-1">
        <h3 class="font-semibold">${item.title}</h3>
        <div class="text-sm text-gray-400">${item.company} · ${item.location}</div>
        <div class="mt-3 flex items-center justify-between">
          <div class="text-xs text-gray-400">Posted: ${new Date(item.date_posted).toLocaleDateString()}</div>
          <a href="${item.apply_link}" class="px-3 py-1 bg-indigo-600 rounded text-white text-sm">Apply</a>
        </div>
      </div>
    </div>
  `;
  return div;
}

async function render(){
  const news = await fetchJSON('/content/news.json');
  const blogs = await fetchJSON('/content/blogs.json');
  const jobs = await fetchJSON('/content/jobs.json');

  const newsGrid = document.getElementById('news-grid');
  news.forEach(item => newsGrid.appendChild(createNewsCard(item)));

  const blogsGrid = document.getElementById('blogs-grid');
  blogs.forEach(item => blogsGrid.appendChild(createBlogCard(item)));

  const jobsGrid = document.getElementById('jobs-grid');
  jobs.forEach(item => jobsGrid.appendChild(createJobCard(item)));
}

render();
</script>

</body>
</html>
